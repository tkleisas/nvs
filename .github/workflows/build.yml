name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        configuration: [Debug, Release]
      fail-fast: false
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Restore dependencies
      run: dotnet restore NVS.slnx

    - name: Build
      run: dotnet build NVS.slnx --configuration ${{ matrix.configuration }} --no-restore

    - name: Test
      run: dotnet test NVS.slnx --configuration ${{ matrix.configuration }} --no-build --verbosity normal --collect:"XPlat Code Coverage"

    - name: Upload coverage
      if: matrix.configuration == 'Debug' && matrix.os == 'ubuntu-latest'
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Publish Windows
      run: dotnet publish src/NVS/NVS.csproj -c Release -r win-x64 --self-contained -o publish/win-x64

    - name: Publish Linux
      run: dotnet publish src/NVS/NVS.csproj -c Release -r linux-x64 --self-contained -o publish/linux-x64

    - name: Publish macOS
      run: dotnet publish src/NVS/NVS.csproj -c Release -r osx-x64 --self-contained -o publish/osx-x64

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          publish/win-x64/NVS.exe
          publish/linux-x64/NVS
          publish/osx-x64/NVS
