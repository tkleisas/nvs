name: Build, Test & Release

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Restore
      run: dotnet restore NVS.slnx

    - name: Build
      run: dotnet build NVS.slnx -c Release --no-restore

    - name: Test
      run: dotnet test NVS.slnx -c Release --no-build --verbosity normal

  publish:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Publish Windows x64
      run: dotnet publish src/NVS/NVS.csproj -c Release -r win-x64 --self-contained -o publish/win-x64

    - name: Publish Linux x64
      run: dotnet publish src/NVS/NVS.csproj -c Release -r linux-x64 --self-contained -o publish/linux-x64

    - name: Publish macOS x64
      run: dotnet publish src/NVS/NVS.csproj -c Release -r osx-x64 --self-contained -o publish/osx-x64

    - name: Publish macOS ARM64
      run: dotnet publish src/NVS/NVS.csproj -c Release -r osx-arm64 --self-contained -o publish/osx-arm64

    - name: Package archives
      run: |
        cd publish
        zip -r ../nvs-win-x64.zip win-x64/
        tar -czf ../nvs-linux-x64.tar.gz linux-x64/
        tar -czf ../nvs-osx-x64.tar.gz osx-x64/
        tar -czf ../nvs-osx-arm64.tar.gz osx-arm64/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          nvs-win-x64.zip
          nvs-linux-x64.tar.gz
          nvs-osx-x64.tar.gz
          nvs-osx-arm64.tar.gz
